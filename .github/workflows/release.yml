name: Release

on:
  push:
    tags:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.compute.outputs.release_name }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute release name and channel
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          release_name="${tag_name#release/}"
          current_version="${tag_name##*/}"
          current_core="$(echo "$current_version" | cut -d. -f1-3)"

          previous_version=""
          while IFS= read -r t; do
            if [[ "$t" == "$tag_name" ]]; then
              continue
            fi
            previous_version="${t##*/}"
            break
          done < <(git for-each-ref --format='%(refname:lstrip=2)' --sort=-creatordate refs/tags/release)

          prerelease="false"
          if [[ -n "$previous_version" ]]; then
            previous_core="$(echo "$previous_version" | cut -d. -f1-3)"
            if [[ "$previous_core" == "$current_core" ]]; then
              prerelease="true"
            fi
          fi

          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - label: macOS (Intel)
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - label: Windows x64
            platform: windows-latest
            args: ""
          - label: Linux x64
            platform: ubuntu-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: ${{ needs.metadata.outputs.release_name }}
          releaseDraft: false
          prerelease: ${{ needs.metadata.outputs.prerelease }}
          args: ${{ matrix.args }}
