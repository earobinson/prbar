name: Release

on:
  push:
    tags:
      - "release/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  metadata:
    name: Resolve release metadata
    runs-on: ubuntu-latest
    outputs:
      release_name: ${{ steps.compute.outputs.release_name }}
      prerelease: ${{ steps.compute.outputs.prerelease }}
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Compute release name and channel
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          release_name="${tag_name#release/}"
          current_version="${tag_name##*/}"
          current_core="$(echo "$current_version" | cut -d. -f1-3)"

          previous_version=""
          while IFS= read -r t; do
            if [[ "$t" == "$tag_name" ]]; then
              continue
            fi
            previous_version="${t##*/}"
            break
          done < <(git for-each-ref --format='%(refname:lstrip=2)' --sort=-creatordate refs/tags/release)

          prerelease="false"
          if [[ -n "$previous_version" ]]; then
            previous_core="$(echo "$previous_version" | cut -d. -f1-3)"
            if [[ "$previous_core" == "$current_core" ]]; then
              prerelease="true"
            fi
          fi

          echo "release_name=$release_name" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.label }}
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - label: macOS (Intel)
            platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - label: Windows x64
            platform: windows-latest
            args: ""
          - label: Linux x64
            platform: ubuntu-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --tags --depth=1 origin "${GITHUB_REF}"
          git checkout --detach FETCH_HEAD

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          if [[ -n "${{ matrix.args }}" ]]; then
            target="${{ matrix.args }}"
            target="${target#--target }"
            rustup target add "$target"
          fi

      - name: Install pnpm
        shell: bash
        run: |
          # The macOS and Windows runners ship Node.js preinstalled. nvm is
          # unusable here: sourcing nvm.sh aborts under `set -e`, and nvm-sh has
          # no Windows support at all (Git Bash). Use the system Node + corepack
          # so the same step works on every platform.
          set -eo pipefail
          corepack enable
          corepack prepare pnpm@10.0.0 --activate
          node --version
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate app icons
        run: pnpm --filter @prbar/desktop generate:icons

      - name: Build the app
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          if [[ -n "${{ matrix.args }}" ]]; then
            build_args+=( ${{ matrix.args }} )
          fi
          pnpm --filter @prbar/desktop tauri build "${build_args[@]}"

      - name: Create release if missing
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          name="${{ needs.metadata.outputs.release_name }}"

          if ! gh release view "$tag" >/dev/null 2>&1; then
            prerelease_args=()
            if [[ "${{ needs.metadata.outputs.prerelease }}" == "true" ]]; then
              prerelease_args+=( --prerelease )
            fi
            gh release create "$tag" --title "$name" --notes "" "${prerelease_args[@]}"
          fi

      - name: Upload release artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"

          if [[ -n "${{ matrix.args }}" ]]; then
            target="${{ matrix.args }}"
            target="${target#--target }"
            bundle_dir="apps/desktop/src-tauri/target/${target}/release/bundle"
          else
            bundle_dir="apps/desktop/src-tauri/target/release/bundle"
          fi

          # Only upload end-user installers. Everything else the Tauri bundler
          # emits (raw `prbar`/`prbar.exe` binaries, the updater archives
          # `*.app.tar.gz` / `*.nsis.zip` and their `.sig` files, and the
          # AppImage's PRBar.AppDir/ staging tree) is excluded.
          files=()
          while IFS= read -r f; do
            files+=("$f")
          done < <(find "$bundle_dir" -type f \( \
            -name '*.deb' -o \
            -name '*.rpm' -o \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.msi' -o \
            -name '*.exe' \
          \))

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release installers found to upload."
            exit 1
          fi

          gh release upload "$tag" --clobber "${files[@]}"
