name: Bump Build And Tag

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write

concurrency:
  group: bump-build-main
  cancel-in-progress: false

jobs:
  bump-and-tag:
    name: Bump build and create tag
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'chore(release): bump build to ')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        shell: bash
        run: |
          set -euo pipefail
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin main
          git checkout -B main FETCH_HEAD

      - name: Install Node.js and pnpm
        shell: bash
        run: |
          set -euo pipefail
          export NVM_DIR="$HOME/.nvm"
          if [[ ! -s "$NVM_DIR/nvm.sh" ]]; then
            curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
          fi
          . "$NVM_DIR/nvm.sh"
          nvm install 22
          nvm use 22
          echo "$NVM_DIR/versions/node/$(nvm version 22)/bin" >> "$GITHUB_PATH"
          corepack enable
          corepack prepare pnpm@10.0.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump build number
        run: node packages/version/scripts/sync-version.mjs --bump build

      - name: Read version metadata
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -e "const v=require('./packages/version/src/version.json'); process.stdout.write(v.major + '.' + v.minor + '.' + v.patch + '.' + v.build);")"
          release_date="$(date -u +%F)"
          tag="release/${release_date}/${version}"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "release_date=$release_date" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Commit bumped build
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TOKEN:-}" ]]; then
            echo "::error::RELEASE_TOKEN secret is not set. Add a PAT named RELEASE_TOKEN with 'contents: write' that can bypass the main branch ruleset."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add -A
          if git diff --cached --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git commit -m "chore(release): bump build to ${{ steps.version.outputs.version }}"
          git push origin main

      - name: Tag release commit
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_TOKEN:-}" ]]; then
            echo "::error::RELEASE_TOKEN secret is not set. Add a PAT named RELEASE_TOKEN with 'contents: write' that can bypass the main branch ruleset."
            exit 1
          fi
          tag="${{ steps.version.outputs.tag }}"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag"
            exit 0
          fi

          git tag "$tag"
          git push origin "$tag"
